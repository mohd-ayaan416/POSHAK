<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POSHAK | Fine Attire</title>
    <style>
        :root {
            --primary: #0a192f; /* Deep Navy */
            --accent: #c5a059;  /* Gold */
            --light: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            line-height: 1.6;
            color: #333;
        }

        /* Navigation */
        nav {
            background: var(--primary);
            color: white;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 4px;
            color: var(--accent);
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1490481651871-ab68de25d43d?auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .hero h1 {
            font-size: 4rem;
            margin-bottom: 10px;
            letter-spacing: 8px;
        }

        .hero p {
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        .btn {
            background: var(--accent);
            color: var(--primary);
            padding: 12px 30px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 2px;
            transition: 0.3s;
        }

        /* Featured Section */
        .featured {
            padding: 50px 5%;
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            border: 1px solid #eee;
            padding: 10px;
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        /* Footer */
        footer {
            background: #111;
            color: white;
            padding: 40px 5%;
            text-align: center;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">POSHAK</div>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">Collections</a>
            <a href="#">Our Story</a>
            <a href="#">Contact</a>
        </div>
    </nav>

    <section class="hero">
        <h1>POSHAK</h1>
        <p>Premium Fabrics. Timeless Craftsmanship.</p>
        <a href="#collections" class="btn">VIEW COLLECTION</a>
    </section>

    <section class="featured" id="collections">
        <h2>Our Collections</h2>
        <div class="grid">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1594932224456-bb984d59409d?auto=format&fit=crop&w=500&q=80" alt="Suits">
                <h3>Formal Wear</h3>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1581333100576-b73bbe92c2cb?auto=format&fit=crop&w=500&q=80" alt="Ethnic">
                <h3>Traditional Wear</h3>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1598033129183-c4f50c7176c8?auto=format&fit=crop&w=500&q=80" alt="Casual">
                <h3>Daily Essentials</h3>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 POSHAK Clothing Co. | Quality you can wear.</p>
        <p>Follow us: Instagram | Facebook | WhatsApp</p>
    </footer>

</body>
</html>
